name: Update Google Scholar Data

on:
  schedule:
    - cron: "0 6 * * 1"  # every Monday at 6am UTC
  workflow_dispatch:       # manual trigger

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install scholarly

      - name: Fetch Google Scholar data
        run: python scripts/fetch_scholar.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/scholar.json
          git diff --cached --quiet || git commit -m "chore: update Google Scholar data"
          git push
